name: Release

on:
    push:
        tags:
            - 'v*.*.*.*'

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14
            - name: Validate maintenance release tag
              run: |
                  TAG_VERSION="${GITHUB_REF_NAME#v}"
                  CLI_VERSION="$(jq -r .version cli/package.json)"
                  APP_VERSION="$(sed -nE "s/^export const APP_VERSION = ['\"]([^'\"]+)['\"]$/\1/p" shared/src/buildInfo.ts)"

                  [[ "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[1-9][0-9]*$ ]]
                  test "$TAG_VERSION" = "$CLI_VERSION"
                  test "$TAG_VERSION" = "$APP_VERSION"
            - run: bun install --frozen-lockfile
            - run: bun run build:single-exe:all
            - name: Package release artifacts
              run: |
                  cd cli/dist-exe
                  mkdir -p ../release-artifacts

                  for dir in bun-*/; do
                      target="${dir%/}"
                      # bun-darwin-arm64 -> hapi-darwin-arm64
                      name="hapi-${target#bun-}"
                      name="${name/windows/win32}"

                      if [[ "$target" == *"windows"* ]]; then
                          zip -j "../release-artifacts/${name}.zip" "$target"/hapi.exe
                      else
                          tar -czvf "../release-artifacts/${name}.tar.gz" -C "$target" hapi
                      fi
                  done

                  cd ../release-artifacts
                  sha256sum * > checksums.txt
            - name: Create Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "${GITHUB_REF#refs/tags/}" \
                      --title "Release ${GITHUB_REF#refs/tags/}" \
                      --generate-notes \
                      cli/release-artifacts/*
